      [4000,11261500,4854000],
      [5000,4339000,4893500],
      [10000,6728300,5756600],
      [100000,81459700,36208400]
    ]);
    data.addColumn({type: 'string', role: 'tooltip'});
    var options = {
      title: 'put operation',
      curveType: 'function',
      legend: { position: 'right' },
      vAxis: { title: 'Nanoseconds' },
      hAxis: { title: 'Number of keys', scaleType: 'log' }

    var chart = new google.visualization.LineChart(document.getElementById('put_array_vs_ll'));
